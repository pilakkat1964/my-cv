career-profile:
  title: Career Profile
  summary: '**Senior Systems Architect & Strategic Consultant** with 38+ years of
    proven expertise in architecting mission-critical systems across telecommunications,
    defence-grade SDR platforms, and national-scale R&D programs. Available for part-time
    advisory, full-time contracts, and project-based engagements globally and in Singapore.


    **Consultant Value Proposition:**

    - **30+ years** architecting complex wireless & embedded systems (5G, LTE, WCDMA,
    SDR, FPGA)

    - **Deep Singapore/Asia Market Knowledge:** A*STAR ecosystem, defence collaboration,
    GovTech programs, smart manufacturing

    - **End-to-End Expertise:** System architecture (INCOSE SysML), embedded Linux/RTOS,
    FPGA design, IIoT platforms (RAMI 4.0, IIRA)

    - **Proven Track Record:** Led multi-disciplinary teams (16+ engineers), managed
    global programs, delivered field-tested systems

    - **Current Focus:** Industry 4.0 digital transformation, private 5G/TSN solutions,
    secure communications architecture

    - **Engagement Models:** Strategic advisory (10-20 hrs/week), full-time contracts,
    or project-based deliverables

    '
