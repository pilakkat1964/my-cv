experiences:
  title: Professional Experience
  info:
  - role: Senior Principal Research Engineer
    time: July 2000 - March 2025
    company: Institute for Infocomm Research (I2R), A*STAR, Singapore
    details: 'Led defence-relevant SDR and communication system architectures. Delivered
      IIoT platforms aligned with Singapore smart manufacturing initiatives. Acted
      as technical advisor across multi-stakeholder programs. Designed secure wireless
      and hybrid connectivity systems (LTE/5G readiness).


      **Consultant/Contractor Readiness:** Experience managing multi-agency engagements,
      delivering advisory to government and industry partners, leading teams across
      organizational boundaries, and executing project-based technical architecture
      work for critical programs.


      **Key Programs:**

      - **5G for Advanced Manufacturing & Smart Urban Systems Program (System Architect):**
      Served as the System Architect for the A*STAR inter-institute program "5G for
      Advanced Manufacturing and Smart Urban Systems" (5GAMSUS). Led the architecture
      for industrial 5G solutions, defining use cases and technical requirements for
      private 5G networks in manufacturing environments.

      - **Industrial 5G & TSN Engagements:** Led subsequent industry engagement projects
      developing solutions for 5G and Time-Sensitive Networking (TSN) over 5G for
      industrial automation, enabling deterministic, low-latency wireless communication
      for smart factories.

      - **Wireless for Knowledge Based Manufacturing (KBM):** Technical advisor for
      a joint project with ARTC to develop a Smart Manufacturing/Industry 4.0 IIoT
      connectivity solution (wireless + wireline) for a major aircraft engine manufacturer.
      Incorporated Private-LTE and 5G, aligning with RAMI 4.0 and IIC IIRA.

      - **SDR based C-band Data Link for Tactical UAVs (Project Manager & Technical
      Lead):** Adapted a custom SDR modem to operate in the C-band (4.5-6GHz) for
      defence UAVs. Designed and implemented the critical time-domain equalizer.

      - **SDR based Data Link for Tactical UAVs  (Project Manager & Technical Lead):**
      Developed a custom OFDM-based SDR modem for military UAVs (VHF/UHF/S-band).
      Incorporated adaptive modulation, frequency hopping, and AES256 encryption.
      Successfully field-tested in Australia.

      - **Reconfigurable Platform for Avionics & Communication (Technical Lead & PM):**
      Developed a Policy-Driven SDR platform for avionics (A*STAR Aerospace Program
      with Airbus). Leveraged Xilinx Virtex-5 Partial Run-time Reconfiguration.

      - **SDR based Multi-channel Intelsat Modem (Project Manager):** Developed a
      JTRS SCA-based SDR waveform for INTELSAT Satcomm links for a large local entity
      (LLE).

      - **Multi-mode SDR Terminal (Project & Technical Lead):** Led a team of ~16
      engineers (collaboration with DSO) to develop a multi-mode terminal (WCDMA +
      802.11a OFDM). Heavy use of MDD/MDA (Telelogic SDT, Rhapsody UML2).

      '
  - role: Senior Staff Engineer
    time: Dec 1995 - July 2000
    company: Motorola Electronics Pte. Ltd, Singapore (Global Software Division /
      Corporate Research & Technology Centre)
    details: '- **Cdma2000 1x Trial System (System Architect):** One of three system
      architects for a technology demonstrator for Sprint PCS inc. Defined system
      feature set, high-level architecture, and interface control documents. Coordinated
      cross-functional global teams for major vendor programs.

      - **Cdma2000 1x Trial System BTS (Technical Lead):** Technical lead for BTS
      subsystems developed in Singapore.

      - **Onyx V42bis Library:** Developed an assembly-optimized V42bis compression
      library for Motorola 56300 DSP.

      - **FLEX & POCSAG Pager Prototypes:** Developed complete hardware/software prototypes
      using HC11 MCU.

      - **Software Quality & Systems Engineering:** As part of the first CMMI Level
      5 qualified team in Singapore, developed deep understanding of the Software
      development lifecycle at the highest maturity level. Developed comprehensive
      test automation solution for automated test execution and coverage analysis
      for the hand optimised DSP assembly libraries.

      '
  - role: R&D Engineer
    time: Dec 1993 - Dec 1995
    company: PCI Pte. Ltd., Singapore
    details: '- **GSM Handset Development:** As part of software team, developed SIM
      handling software subsystem for Singapore''s first GSM R&D project. As part
      of the Systems Engineering team, working with ADI & TTP Ltd., helped in fleshing
      out the design and testing approaches for the handset prototype. Developed a
      POCASAG page virtual platform based on Visual Basic to help accelerate the development
      of pager product line in a parallel effort.

      '
  - role: Engineer Executive
    time: Sept 1988 - Dec 1993
    company: Indian Telephone Industries Ltd. (ITI), Bangalore, India (Switching R&D)
    details: '- **Large Digital Branch Exchange:** Developed custom RTOS (REALX-86),
      HDLC protocol implementation, main call processing software, HDLC Serial communication
      hardware and implemented a 1+1 Hot Standby Redundancy Scheme with zero call
      loss on fail-over.

      '
  - role: Scientific Officer - SC
    time: Dec 1986 - Sept 1988
    company: TIFR / SAMEER, Mumbai, India (Microwave Oscillators & Amplifiers)
    details: '- Developed PIN diode switches and VHF power amplifiers for the MST
      Radar.

      - Developed TCXO, PLLs, VCXOs, and VHF/UHF filters for a Satellite News Dissemination
      System.

      '
