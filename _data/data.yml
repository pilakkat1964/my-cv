career-profile:
  title: Career Profile
  summary: |
    Senior Systems Architect with 30+ years of experience delivering mission-critical systems across telecommunications, defence-grade SDR platforms, and national-scale R&D programs. Extensive background working within Singapore's A*STAR ecosystem and global telecom leaders. Proven expertise in architecting secure, high-reliability systems aligned with government, defence, and Industry 4.0 frameworks.

    **Value Proposition (Singapore Market):** Deep alignment with Singapore R&D ecosystem (A*STAR, industry collaborations); Experience in defence-oriented SDR, avionics, and secure communications systems; Strong Industry 4.0 / Smart Manufacturing expertise (RAMI 4.0, IIRA); Proven ability to lead multi-agency and multi-vendor technical programs; Eligible for advisory roles in GovTech, Defence, and national innovation programs.

